<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에이콘 편집부 — 제안서 관리</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --navy:#0A1628;--navy2:#0D1C35;
  --teal:#1D9E75;--teal2:#0F6E56;--teal3:#E1F5EE;
  --amber:#EF9F27;--amberD:#854F0B;--amberBg:#FAEEDA;
  --burg:#7A1F2B;--burgD:#5A1520;--burgBg:rgba(122,31,43,.07);
  --purple:#534AB7;--purpleBg:#EEEDFE;
  --coral:#C94D27;
  --bg:#F5F4F0;--card:#fff;
  --text:#0F1923;--muted:#586070;--muted2:#8A94A3;
  --bd:rgba(0,0,0,.07);--bdm:rgba(0,0,0,.12);
  --mono:'JetBrains Mono',monospace;
  --serif:'Noto Serif KR',serif;
  --sans:'Pretendard',-apple-system,sans-serif;

  /* 상태 색상 */
  --s-new:#2563EB;      --s-new-bg:#EFF6FF;
  --s-review:#854F0B;   --s-review-bg:#FAEEDA;
  --s-accept:#0F6E56;   --s-accept-bg:#E1F5EE;
  --s-revise:#6D28D9;   --s-revise-bg:#EDE9FE;
  --s-reject:#9F1239;   --s-reject-bg:#FFF1F2;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}

/* ── TOP NAV ── */
.top-nav{
  position:sticky;top:0;z-index:200;
  background:var(--navy);border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;height:56px;padding:0 24px;gap:0;
}
.tn-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:32px}
.tn-logo-txt{font-size:15px;font-weight:700;color:#fff}
.tn-logo-txt span{color:var(--teal)}
.tn-badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(122,31,43,.6);color:#fff;letter-spacing:.06em;text-transform:uppercase}
.tn-links{display:flex;gap:2px;list-style:none;flex:1}
.tn-link{background:none;border:none;font-family:var(--sans);font-size:13px;color:rgba(255,255,255,.65);padding:6px 11px;border-radius:5px;cursor:pointer;transition:all .14s;white-space:nowrap}
.tn-link:hover,.tn-link.on{color:#fff;background:rgba(255,255,255,.08)}
.tn-link.on{color:var(--teal)}
.tn-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tn-user{display:flex;align-items:center;gap:8px;font-size:12.5px;color:rgba(255,255,255,.55)}
.tn-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.tn-back{font-size:12px;color:rgba(255,255,255,.45);text-decoration:none;padding:5px 12px;border:1px solid rgba(255,255,255,.15);border-radius:5px;transition:all .14s}
.tn-back:hover{color:#fff;border-color:rgba(255,255,255,.35)}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}

/* ── SIDEBAR ── */
.sidebar{background:var(--card);border-right:1px solid var(--bdm);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-sec{padding:0 14px;margin-bottom:22px}
.sb-sec-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .13s;border:none;background:none;font-family:var(--sans);width:100%;text-align:left}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.on{background:var(--teal3);color:var(--teal2);font-weight:600}
.sb-item-ico{font-size:15px;flex-shrink:0}
.sb-cnt{margin-left:auto;font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:10px;background:var(--bg);border:1px solid var(--bd)}
.sb-item.on .sb-cnt{background:var(--teal);color:#fff;border-color:var(--teal)}

/* 상태 필터 */
.sb-status{display:flex;flex-direction:column;gap:4px;padding:0 14px}
.sb-st{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--muted);transition:all .13s;border:none;background:none;font-family:var(--sans);width:100%;text-align:left}
.sb-st:hover{background:var(--bg)}
.sb-st.on{font-weight:600}
.sb-st-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sb-st-cnt{margin-left:auto;font-size:10.5px;font-family:var(--mono);color:var(--muted2)}

/* ── MAIN ── */
.main{padding:28px 28px 60px;overflow-y:auto}
.page{display:none}.page.on{display:block}

/* ── DASHBOARD ── */
.dash-top{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--card);border:1px solid var(--bdm);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.kpi.all::after{background:var(--teal)}
.kpi.new::after{background:var(--s-new)}
.kpi.review::after{background:var(--amber)}
.kpi.accept::after{background:var(--s-accept)}
.kpi.reject::after{background:var(--coral)}
.kpi-n{font-family:var(--serif);font-size:32px;font-weight:700;line-height:1;margin-bottom:5px}
.kpi.all .kpi-n{color:var(--text)}
.kpi.new .kpi-n{color:var(--s-new)}
.kpi.review .kpi-n{color:var(--amberD)}
.kpi.accept .kpi-n{color:var(--s-accept)}
.kpi.reject .kpi-n{color:var(--coral)}
.kpi-l{font-size:11.5px;color:var(--muted);font-weight:500}
.kpi-sub{font-size:10px;color:var(--muted2);margin-top:4px;font-family:var(--mono)}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.dash-card{background:var(--card);border:1px solid var(--bdm);border-radius:10px;padding:20px}
.dc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.dc-title{font-size:14px;font-weight:700;color:var(--text)}
.dc-sub{font-size:11.5px;color:var(--muted)}

/* 최근 제안서 테이블 */
.prop-table{width:100%;border-collapse:collapse}
.prop-table th{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);text-align:left;padding:0 0 10px;border-bottom:1px solid var(--bdm)}
.prop-table td{padding:11px 0;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
.prop-table tr:last-child td{border-bottom:none}
.prop-table tr{cursor:pointer;transition:background .1s}
.prop-table tr:hover td{background:rgba(29,158,117,.03)}
.pt-title{font-weight:500;color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt-author{color:var(--muted);font-size:12px}
.pt-cat{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg);border:1px solid var(--bdm);white-space:nowrap}
.pt-date{font-size:11.5px;color:var(--muted2);font-family:var(--mono);white-space:nowrap}

/* 상태 배지 */
.st-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:100px;white-space:nowrap}
.st-badge::before{content:'';width:5px;height:5px;border-radius:50%}
.st-new{background:var(--s-new-bg);color:var(--s-new)}.st-new::before{background:var(--s-new)}
.st-review{background:var(--s-review-bg);color:var(--s-review)}.st-review::before{background:var(--s-review)}
.st-accept{background:var(--s-accept-bg);color:var(--s-accept)}.st-accept::before{background:var(--s-accept)}
.st-revise{background:var(--s-revise-bg);color:var(--s-revise)}.st-revise::before{background:var(--s-revise)}
.st-reject{background:var(--s-reject-bg);color:var(--s-reject)}.st-reject::before{background:var(--s-reject)}

/* 카테고리 차트 */
.cat-bars{display:flex;flex-direction:column;gap:8px}
.cat-row{display:flex;align-items:center;gap:10px;font-size:12.5px}
.cat-label{width:140px;flex-shrink:0;color:var(--text);font-weight:500}
.cat-bar-wrap{flex:1;background:var(--bg);border-radius:3px;height:8px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px;background:var(--teal);transition:width .6s ease}
.cat-cnt{font-family:var(--mono);font-size:11px;color:var(--muted2);width:32px;text-align:right;flex-shrink:0}

/* 월별 차트 */
.month-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:8px}
.mc-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.mc-bar{width:100%;border-radius:3px 3px 0 0;background:var(--teal);min-height:3px;transition:height .5s ease}
.mc-label{font-size:9.5px;color:var(--muted2);font-family:var(--mono)}

/* ── PROPOSAL LIST PAGE ── */
.list-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.lt-search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bdm);border-radius:8px;padding:0 14px;flex:1;max-width:360px;height:38px}
.lt-search input{border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--text);background:transparent;flex:1}
.lt-search svg{width:14px;height:14px;stroke:var(--muted2);fill:none;stroke-width:2;flex-shrink:0}
.lt-select{height:38px;padding:0 12px;border:1px solid var(--bdm);border-radius:8px;font-family:var(--sans);font-size:12.5px;color:var(--text);background:var(--card);cursor:pointer;outline:none}
.lt-cnt{font-size:12.5px;color:var(--muted);margin-left:auto}

/* 카드 목록 */
.prop-cards{display:flex;flex-direction:column;gap:10px}
.prop-card{
  background:var(--card);border:1px solid var(--bdm);border-radius:10px;
  padding:16px 18px;cursor:pointer;transition:all .15s;
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;
}
.prop-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.prop-card.selected{border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.pc-title{font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
.pc-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.pc-author{font-size:12.5px;color:var(--muted)}
.pc-cat{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg);border:1px solid var(--bdm);color:var(--muted)}
.pc-svc{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:100px}
.pc-svc.plan{background:var(--teal3);color:var(--teal2)}
.pc-svc.self{background:var(--amberBg);color:var(--amberD)}
.pc-summary{font-size:12.5px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.pc-date{font-size:11px;color:var(--muted2);font-family:var(--mono)}
.pc-pages{font-size:11px;color:var(--muted2)}
.pc-score{font-size:11px;font-weight:600;font-family:var(--mono)}

/* ── DETAIL PAGE ── */
.detail-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
.det-back{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);padding:6px 13px;border-radius:7px;border:1px solid var(--bdm);background:var(--card);cursor:pointer;margin-bottom:20px;font-family:var(--sans);transition:background .12s}
.det-back:hover{background:var(--bg)}

/* 제안서 내용 */
.det-hero{background:var(--navy);border-radius:12px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.det-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:.3}
.det-h-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.det-title{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.015em;line-height:1.3}
.det-author-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.det-author{font-size:13.5px;color:rgba(255,255,255,.65)}
.det-cats{display:flex;gap:6px;flex-wrap:wrap}
.det-cat{font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.det-meta-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.det-meta-item{font-size:11.5px;color:rgba(255,255,255,.45)}
.det-meta-item b{color:rgba(255,255,255,.8)}

.det-section{background:var(--card);border:1px solid var(--bdm);border-radius:10px;margin-bottom:12px}
.det-sec-head{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.det-sec-title{font-size:13px;font-weight:600;color:var(--text)}
.det-sec-body{padding:16px 18px;font-size:13.5px;color:var(--muted);line-height:1.82}
.det-sec-body b{color:var(--text);font-weight:500}

/* 마케팅 채널 */
.mkt-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.mkt-tag{font-size:11px;padding:2px 9px;background:var(--bg);border:1px solid var(--bdm);border-radius:100px;color:var(--muted)}

/* ePub 체크 */
.epub-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.epub-chk-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);padding:5px 8px;background:var(--bg);border-radius:5px}
.epub-chk-ico{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.epub-chk-ico.y{background:var(--teal3);color:var(--teal2)}
.epub-chk-ico.n{background:var(--bg);border:1px solid var(--bdm);color:var(--muted2)}

/* 첨부 파일 */
.attach-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg);border:1px solid var(--bdm);border-radius:6px;font-size:12.5px;color:var(--muted);margin-bottom:6px}
.attach-row:last-child{margin-bottom:0}
.attach-ico{font-size:18px;flex-shrink:0}
.attach-name{flex:1;font-weight:500;color:var(--text)}

/* ── 평가 패널 ── */
.eval-panel{position:sticky;top:84px}
.eval-card{background:var(--card);border:1px solid var(--bdm);border-radius:10px;margin-bottom:12px;overflow:hidden}
.eval-card-head{padding:13px 16px;background:var(--bg);border-bottom:1px solid var(--bdm);font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.eval-card-body{padding:16px}

/* 상태 변경 */
.st-btns{display:flex;flex-direction:column;gap:6px}
.st-btn{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:7px;border:1.5px solid;cursor:pointer;font-family:var(--sans);font-size:12.5px;font-weight:500;transition:all .15s;background:none;text-align:left}
.st-btn:hover{opacity:.82}
.st-btn.active{font-weight:700}
.st-btn-new{border-color:var(--s-new);color:var(--s-new)}.st-btn-new.active{background:var(--s-new-bg)}
.st-btn-review{border-color:var(--amberD);color:var(--amberD)}.st-btn-review.active{background:var(--amberBg)}
.st-btn-accept{border-color:var(--s-accept);color:var(--s-accept)}.st-btn-accept.active{background:var(--s-accept-bg)}
.st-btn-revise{border-color:var(--s-revise);color:var(--s-revise)}.st-btn-revise.active{background:var(--s-revise-bg)}
.st-btn-reject{border-color:var(--s-reject);color:var(--s-reject)}.st-btn-reject.active{background:var(--s-reject-bg)}

/* 점수 슬라이더 */
.score-section{margin-bottom:14px}
.score-row{margin-bottom:10px}
.score-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-size:12px}
.score-label{color:var(--muted);font-weight:500}
.score-val{font-family:var(--mono);font-weight:600;color:var(--burg)}
.score-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--bg);border-radius:2px;outline:none;border:1px solid var(--bdm)}
.score-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--burg);cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--burg)}
.total-score{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--navy);border-radius:7px;margin-top:8px}
.ts-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}
.ts-val{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--teal);line-height:1}
.ts-grade{font-size:11px;color:rgba(255,255,255,.5);text-align:right}

/* 등급 */
.grade-badge{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;font-family:var(--serif);font-size:20px;font-weight:700}
.grade-S{background:#FFF7ED;color:#B45309}
.grade-A{background:var(--teal3);color:var(--teal2)}
.grade-B{background:var(--purpleBg);color:var(--purple)}
.grade-C{background:var(--amberBg);color:var(--amberD)}
.grade-D{background:#FFF1F2;color:#9F1239}

/* 편집자 메모 */
.memo-area{width:100%;min-height:100px;padding:10px 12px;border:1.5px solid var(--bdm);border-radius:7px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--bg);resize:vertical;line-height:1.7;outline:none;transition:border .15s}
.memo-area:focus{border-color:var(--teal);background:#fff}

/* 저장 버튼 */
.save-btn{width:100%;padding:11px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .15s}
.save-btn:hover{opacity:.86}
.danger-btn{width:100%;padding:9px;background:none;color:var(--coral);border:1px solid var(--coral);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;margin-top:6px}
.danger-btn:hover{background:#FFF1F2}

/* 편집자 히스토리 */
.hist-item{padding:10px 0;border-bottom:1px solid var(--bd)}
.hist-item:last-child{border-bottom:none}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-who{font-size:12px;font-weight:600;color:var(--text)}
.hist-time{font-size:10.5px;color:var(--muted2);font-family:var(--mono)}
.hist-txt{font-size:12px;color:var(--muted);line-height:1.65}

/* 인세 시뮬레이션 */
.sim-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--bd);font-size:12.5px}
.sim-row:last-child{border-bottom:none}
.sim-lbl{color:var(--muted)}
.sim-val{font-family:var(--mono);font-weight:600;color:var(--text)}
.sim-val.hi{color:var(--teal2)}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;font-size:13px;padding:12px 20px;border-radius:9px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;border-left:3px solid var(--teal)}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:1100px){.detail-layout{grid-template-columns:1fr}.eval-panel{position:static}}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{display:none}.dash-top{grid-template-columns:repeat(3,1fr)}.dash-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

let proposals = JSON.parse(localStorage.getItem('acorn_proposals') || 'null') || SAMPLE;
let currentFilter = {status:'', svc:'', search:'', sort:'newest'};
let currentDetailId = null;
let currentPage = 'dashboard';

function saveProposals() { localStorage.setItem('acorn_proposals', JSON.stringify(proposals)); }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showPage(name) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('page-'+name)?.classList.add('on');
  document.querySelectorAll('.tn-link').forEach(l => l.classList.remove('on'));
  document.querySelectorAll('.sb-item').forEach(l => l.classList.remove('on'));
  if (name==='dashboard') {
    document.querySelectorAll('.tn-link')[0].classList.add('on');
    document.querySelectorAll('.sb-item')[0].classList.add('on');
    renderDashboard();
  } else if (name==='proposals') {
    document.querySelectorAll('.tn-link')[1].classList.add('on');
    document.querySelectorAll('.sb-item')[1].classList.add('on');
    renderProposalList();
  } else if (name==='analytics') {
    document.querySelectorAll('.tn-link')[2].classList.add('on');
    renderAnalytics();
  }
  renderSidebar();
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar() {
  document.getElementById('sb-all-cnt').textContent = proposals.length;
  document.getElementById('sb-list-cnt').textContent = proposals.length;

  // 상태별
  const sList = document.getElementById('sb-status-list');
  const counts = {};
  STATUSES.forEach(s => counts[s] = 0);
  proposals.forEach(p => { if(counts[p.status]!==undefined) counts[p.status]++; });
  sList.innerHTML = STATUSES.map(s => `
    <button class="sb-st${currentFilter.status===s?' on':''}" onclick="filterByStatus('${s}')">
      <span class="sb-st-dot" style="background:var(--s-${STATUS_CLASS[s]})"></span>
      ${s} <span class="sb-st-cnt">${counts[s]}</span>
    </button>`).join('');

  // 카테고리별
  const cCounts = {};
  proposals.forEach(p => {
    const c = p.cat.split(' > ')[0] || '기타';
    cCounts[c] = (cCounts[c]||0)+1;
  });
  const cList = document.getElementById('sb-cat-list');
  cList.innerHTML = Object.entries(cCounts).map(([c,n]) =>
    `<button class="sb-st" onclick="filterByCat('${c}')">
      <span class="sb-st-dot" style="background:var(--teal)"></span>
      ${c} <span class="sb-st-cnt">${n}</span>
    </button>`).join('');
}

function filterByStatus(s) {
  currentFilter.status = currentFilter.status===s ? '' : s;
  showPage('proposals');
}
function filterByCat(c) {
  currentFilter.search = c;
  document.getElementById('search-input').value = c;
  showPage('proposals');
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard() {
  // KPI
  const total = proposals.length;
  const counts = {};
  STATUSES.forEach(s => counts[s]=0);
  proposals.forEach(p => { if(counts[p.status]!==undefined) counts[p.status]++; });
  const acceptRate = total ? Math.round(counts['채택']/total*100) : 0;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi all"><div class="kpi-n">${total}</div><div class="kpi-l">전체 제안서</div><div class="kpi-sub">누적 접수</div></div>
    <div class="kpi new"><div class="kpi-n">${counts['신규']}</div><div class="kpi-l">신규 접수</div><div class="kpi-sub">검토 대기</div></div>
    <div class="kpi review"><div class="kpi-n">${counts['검토중']}</div><div class="kpi-l">검토중</div><div class="kpi-sub">진행 중</div></div>
    <div class="kpi accept"><div class="kpi-n">${counts['채택']}</div><div class="kpi-l">채택</div><div class="kpi-sub">채택률 ${acceptRate}%</div></div>
    <div class="kpi reject"><div class="kpi-n">${counts['반려']}</div><div class="kpi-l">반려</div><div class="kpi-sub">${counts['보완요청']}건 보완중</div></div>`;

  // 카테고리 차트
  const catMap = {};
  proposals.forEach(p => {
    const c = (p.cat||'기타').split(' > ')[0];
    catMap[c] = (catMap[c]||0)+1;
  });
  const maxC = Math.max(...Object.values(catMap), 1);
  document.getElementById('cat-chart').innerHTML = Object.entries(catMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([c,n])=>`
      <div class="cat-row">
        <div class="cat-label">${c}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.round(n/maxC*100)}%"></div></div>
        <div class="cat-cnt">${n}</div>
      </div>`).join('');

  // 월별 차트
  const now = new Date();
  const months = Array.from({length:6},(_,i)=>{
    const d = new Date(now.getFullYear(), now.getMonth()-5+i, 1);
    return {key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
            label:`${d.getMonth()+1}월`, cnt:0};
  });
  proposals.forEach(p => {
    const mk = p.date?.slice(0,7);
    const m = months.find(m=>m.key===mk);
    if(m) m.cnt++;
  });
  const maxM = Math.max(...months.map(m=>m.cnt), 1);
  document.getElementById('month-chart').innerHTML = months.map(m=>`
    <div class="mc-bar-wrap">
      <div class="mc-bar" style="height:${Math.max(Math.round(m.cnt/maxM*70),3)}px"></div>
      <div class="mc-label">${m.label}</div>
    </div>`).join('');

function filterProposals() {
  currentFilter.search = document.getElementById('search-input').value.toLowerCase();
  currentFilter.status = document.getElementById('filter-status').value;
  currentFilter.svc    = document.getElementById('filter-svc').value;
  currentFilter.sort   = document.getElementById('filter-sort').value;
  renderProposalList();
}

function renderProposalList() {
  document.getElementById('filter-status').value = currentFilter.status;
  document.getElementById('filter-svc').value    = currentFilter.svc;
  document.getElementById('search-input').value  = currentFilter.search;

  let list = [...proposals];
  if(currentFilter.status) list = list.filter(p=>p.status===currentFilter.status);
  if(currentFilter.svc)    list = list.filter(p=>p.svc===currentFilter.svc);
  if(currentFilter.search) list = list.filter(p=>
    p.title.toLowerCase().includes(currentFilter.search) ||
    p.author.toLowerCase().includes(currentFilter.search) ||
    (p.cat||'').toLowerCase().includes(currentFilter.search));
  if(currentFilter.sort==='oldest')  list.sort((a,b)=>a.date.localeCompare(b.date));
  else if(currentFilter.sort==='score') list.sort((a,b)=>totalScore(b)-totalScore(a));
  else if(currentFilter.sort==='title') list.sort((a,b)=>a.title.localeCompare(b.title,'ko'));
  else list.sort((a,b)=>b.date.localeCompare(a.date));

  document.getElementById('list-cnt-txt').textContent = `${list.length}건`;
  document.getElementById('prop-card-list').innerHTML = list.length === 0
    ? '<div style="text-align:center;padding:60px;color:var(--muted2);font-size:14px">검색 결과가 없습니다.</div>'
    : list.map(p=>`
      <div class="prop-card${currentDetailId===p.id?' selected':''}" onclick="openDetail('${p.id}')">
        <div>
          <div class="pc-title">${p.title}</div>
          <div class="pc-meta">
            <span class="pc-author">✍ ${p.author}</span>
            <span class="pc-cat">${(p.cat||'').split(' > ').pop()}</span>
            <span class="pc-svc ${p.svc==='기획출판'?'plan':'self'}">${p.svc}</span>
            ${p.amazon ? '<span style="font-size:10.5px;padding:2px 8px;border-radius:100px;background:#FFF7ED;color:#B45309;font-weight:600">+ KDP</span>' : ''}
          </div>
          <div class="pc-summary">${p.summary}</div>
        </div>
        <div class="pc-right">
          ${statusBadge(p.status)}
          <div class="pc-date">${p.date}</div>
          <div class="pc-pages" style="font-size:11px;color:var(--muted2)">${(p.pages||0).toLocaleString()}p</div>
          <div class="pc-score" style="color:${gradeColor(scoreGrade(totalScore(p)))}">
            ${gradeEmoji(scoreGrade(totalScore(p)))} ${Math.round(totalScore(p))}점

}

function renderSimSection(p) {
  const SUPPLY = 0.65;
  const isSelf = p.svc === '자비출판';
  const printRate = isSelf ? 0.9 : 0.1;
  const ebookRate = isSelf ? 0.9 : 0.2;
  const copies = 1000;
  const edl = 500;
  const price = p.price || 0;
  const ePrice = Math.floor(price * 0.65 / 1000) * 1000;
  const printY1 = price * SUPPLY * printRate * copies;
  const ebookY1 = ePrice * SUPPLY * ebookRate * edl;
  const y1 = printY1 + ebookY1;
  const y3 = y1 * 2.1;
  const fmt = n => Math.round(n).toLocaleString('ko-KR');
  return `
    <div class="sim-row"><span class="sim-lbl">정가</span><span class="sim-val">₩ ${fmt(price)}</span></div>
    <div class="sim-row"><span class="sim-lbl">종이책 인세율</span><span class="sim-val">${(printRate*100).toFixed(0)}% (공급율 65% 적용)</span></div>
    <div class="sim-row"><span class="sim-lbl">1년 예상 판매 (1,000부 기준)</span><span class="sim-val hi">₩ ${fmt(printY1)}</span></div>
    <div class="sim-row"><span class="sim-lbl">전자책 포함 1년 인세</span><span class="sim-val hi">₩ ${fmt(y1)}</span></div>
    <div class="sim-row"><span class="sim-lbl">3년 누적 예상 인세</span><span class="sim-val hi">₩ ${fmt(y3)}</span></div>`;
}

function changeStatus(id, status) {
  const p = proposals.find(x=>x.id===id);
  if(!p) return;
  p.status = status;
  p.history = p.history || [];
  p.history.push({who:'편집장', time:new Date().toISOString().slice(0,10), txt:`상태 변경: ${status}`});
  saveProposals();
  toast(`상태가 "${status}"로 변경됐습니다.`);
  openDetail(id);
}

function updateScore(id, key, val) {
  const p = proposals.find(x=>x.id===id);
  if(!p) return;
  p.scores = p.scores || {};
  p.scores[key] = +val;
  const el = document.getElementById(`sv-${id}-${key}`);
  if(el) el.textContent = val+'점';
  const t = totalScore(p);
  const grade = scoreGrade(t);
  const tv = document.getElementById(`ts-val-${id}`);
  const tg = document.getElementById(`ts-grade-${id}`);
  const gb = document.getElementById('det-grade-badge');
  if(tv) tv.textContent = Math.round(t);
  if(tg) tg.textContent = gradeDesc(grade);
  if(gb) { gb.textContent = grade; gb.className = 'grade-badge grade-'+grade; }
  saveProposals();
}

function saveMemo(id) {
  const p = proposals.find(x=>x.id===id);
  if(!p) return;
  const el = document.getElementById(`memo-${id}`);
  if(el) p.memo = el.value;
  saveProposals();
  toast('메모가 저장됐습니다.');
}

function addHistory(id) {
  const p = proposals.find(x=>x.id===id);
  const el = document.getElementById(`hist-input-${id}`);
  if(!p || !el || !el.value.trim()) return;
  p.history = p.history || [];
  p.history.push({who:'편집장', time:new Date().toISOString().slice(0,10), txt:el.value.trim()});
  el.value = '';
  saveProposals();
  toast('히스토리가 추가됐습니다.');
  openDetail(id);
}

function deleteProposal(id) {
  if(!confirm('제안서를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  proposals = proposals.filter(x=>x.id!==id);
  saveProposals();
  currentDetailId = null;
  toast('제안서가 삭제됐습니다.');
  showPage('proposals');
}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:5px">카테고리</label><input id="np-cat" placeholder="IT > AI · 머신러닝" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdm);border-radius:7px;font-family:var(--sans);font-size:13px;outline:none"></div>
        <div><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:5px">출판 유형</label><select id="np-svc" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdm);border-radius:7px;font-family:var(--sans);font-size:13px;outline:none"><option>기획출판</option><option>자비출판</option></select></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:5px">예상 분량</label><input id="np-pages" type="number" placeholder="450" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdm);border-radius:7px;font-family:var(--sans);font-size:13px;outline:none"></div>
        <div><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:5px">예상 정가</label><input id="np-price" type="number" placeholder="28000" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdm);border-radius:7px;font-family:var(--sans);font-size:13px;outline:none"></div>
      </div>
      <div><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:5px">한 줄 요약</label><textarea id="np-summary" rows="2" placeholder="도서 핵심 가치를 한 문장으로…" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdm);border-radius:7px;font-family:var(--sans);font-size:13px;outline:none;resize:vertical"></textarea></div>
      <button onclick="saveNewProposal()" style="background:var(--teal);color:#fff;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)">등록하기</button>
    </div>`;
  const overlay = document.getElementById('modal-overlay');
  overlay.style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
function saveNewProposal() {
  const title = document.getElementById('np-title').value.trim();
  const author = document.getElementById('np-author').value.trim();
  const email = document.getElementById('np-email').value.trim();
  if(!title || !author) { alert('저자명과 도서 가제는 필수입니다.'); return; }
  const newP = {
    id: 'p'+Date.now(),
    title, author, email,
    cat: document.getElementById('np-cat').value || '미분류',
    svc: document.getElementById('np-svc').value,
    pages: +document.getElementById('np-pages').value || 0,
    price: +document.getElementById('np-price').value || 0,
    summary: document.getElementById('np-summary').value,
    status: '신규',
    date: new Date().toISOString().slice(0,10),
    scores:{market:70,diff:70,author:70,plan:70,pub:70},
    memo:'', history:[], epub:[],
  };
  proposals.unshift(newP);
  saveProposals();
  closeModal();
  toast('제안서가 등록됐습니다.');
  openDetail(newP.id);
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function totalScore(p) {
  const s = p.scores||{};
  return ([s.market,s.diff,s.author,s.plan,s.pub].reduce((a,v)=>a+(v||70),0)/5);
}
function scoreGrade(score) {
  if(score>=90) return 'S';
  if(score>=80) return 'A';
  if(score>=70) return 'B';
  if(score>=60) return 'C';
  return 'D';
}
function gradeDesc(g) {
  return {S:'즉시 채택 권장',A:'채택 권장',B:'검토 후 결정',C:'보완 후 재검토',D:'채택 어려움'}[g]||'';
}
function gradeColor(g) {
  return {S:'#B45309',A:'var(--teal2)',B:'var(--purple)',C:'var(--amberD)',D:'var(--coral)'}[g]||'var(--muted)';
}
function gradeEmoji(g) {
  return {S:'🏆',A:'⭐',B:'✅',C:'🔄',D:'❌'}[g]||'';
}
function statusBadge(s) {
  const cls = STATUS_CLASS[s]||'new';
  return `<span class="st-badge st-${cls}">${s}</span>`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}

// 모달 외부 클릭 닫기
document.getElementById('modal-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('modal-overlay')) closeModal();
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
showPage('dashboard');
</script>
</body>
</html>
