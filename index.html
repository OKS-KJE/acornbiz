<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비즈니스 모델 — KJ엔지니어링 · 에이콘 출판사 · 에이콘온</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;--card:#FFFFFF;--text:#19190F;--muted:#636259;
  --border:rgba(0,0,0,0.07);--border-md:rgba(0,0,0,0.12);
  --p50:#EEEDFE;--p600:#534AB7;--p800:#3C3489;
  --t50:#E1F5EE;--t600:#0F6E56;--t800:#085041;
  --c50:#FAECE7;--c600:#993C1D;--c800:#712B13;
  --a50:#FAEEDA;--a600:#854F0B;--a800:#633806;
  --g50:#F1EFE8;--g600:#5F5E5A;--g800:#444441;
}
html,body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.65}

/* ── PAGE SHELL */
.page{max-width:960px;margin:0 auto;padding:44px 28px 88px}

/* ── OVERVIEW */
.ov-header{margin-bottom:30px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ov-title{font-size:26px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.ov-sub{font-size:13.5px;color:var(--muted)}

/* KJ tier-1 */
.kj-wrap{background:var(--p50);border:1px solid var(--p600);border-radius:16px;padding:22px 24px;margin-bottom:6px}
.kj-title{font-size:19px;font-weight:600;color:var(--p800)}
.kj-sub{font-size:12.5px;color:var(--p600);margin-top:2px;margin-bottom:18px}
.kj-svc{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.kj-svc-card{background:#fff;border:1px solid var(--border-md);border-radius:8px;padding:12px 15px}
.kj-svc-name{font-size:14px;font-weight:500;margin-bottom:3px}
.kj-svc-desc{font-size:12px;color:var(--muted)}
.expand-section{border-top:1px dashed rgba(83,74,183,.22);padding-top:14px;display:flex;flex-direction:column;gap:9px}
.expand-row{display:flex;align-items:flex-start;gap:10px}
.exp-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0;letter-spacing:.01em}
.exp-pill.dom{background:var(--p800);color:#fff}
.exp-pill.glb{background:var(--a600);color:#fff}
.exp-text{font-size:12.5px;color:var(--p800);padding-top:3px}
.exp-text.glb{color:var(--a800)}

/* Connectors */
.conn-zone{display:flex;justify-content:space-around;padding:0 17%;margin:12px 0 10px}
.conn{display:flex;flex-direction:column;align-items:center}
.conn-line{width:1px;height:20px;background:var(--g600);opacity:.3}
.conn-head{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--g600);opacity:.4}

/* Tier-2 company cards */
.t2-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.co-card{border-radius:14px;padding:20px 20px 18px;border:1px solid;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;position:relative;overflow:hidden}
.co-card::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s}
.co-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.09)}
.co-card.teal{background:var(--t50);border-color:var(--t600)}
.co-card.coral{background:var(--c50);border-color:var(--c600)}
.co-name{font-size:17px;font-weight:600;margin-bottom:2px}
.co-card.teal .co-name{color:var(--t800)}
.co-card.coral .co-name{color:var(--c800)}
.co-spec{font-size:12px;margin-bottom:15px}
.co-card.teal .co-spec{color:var(--t600)}
.co-card.coral .co-spec{color:var(--c600)}
.co-svc{font-size:12.5px;padding:7px 12px;background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.co-svc:last-of-type{margin-bottom:0}
.co-cta{display:inline-flex;align-items:center;gap:5px;margin-top:16px;font-size:12px;font-weight:500;padding:7px 14px;border-radius:100px;letter-spacing:.01em}
.teal .co-cta,.co-card.teal .co-cta{background:var(--t600);color:#fff}
.coral .co-cta,.co-card.coral .co-cta{background:var(--c600);color:#fff}

/* ── DETAIL PAGE */
.detail-nav{display:flex;align-items:center;gap:14px;margin-bottom:30px}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);cursor:pointer;padding:7px 14px;border-radius:8px;border:1px solid var(--border-md);background:var(--card);transition:background .12s;font-family:inherit}
.back-btn:hover{background:var(--bg)}

.hero{border-radius:16px;padding:26px 28px 24px;margin-bottom:30px;border:1px solid}
.hero.teal{background:var(--t50);border-color:var(--t600)}
.hero.coral{background:var(--c50);border-color:var(--c600)}
.hero-tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;margin-bottom:10px;letter-spacing:.04em}
.teal .hero-tag{background:var(--t600);color:#fff}
.coral .hero-tag{background:var(--c600);color:#fff}
.hero-name{font-size:27px;font-weight:600;letter-spacing:-.025em;margin-bottom:5px}
.teal .hero-name{color:var(--t800)}
.coral .hero-name{color:var(--c800)}
.hero-tagline{font-size:14px}
.teal .hero-tagline{color:var(--t600)}
.coral .hero-tagline{color:var(--c600)}

/* Section header */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.sec-head h2{font-size:15px;font-weight:600}
.sec-badge{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:4px;border:1px solid}
.common-badge{background:var(--p50);color:var(--p800);border-color:var(--p600)}
.excl-badge{background:var(--a50);color:var(--a800);border-color:var(--a600)}

/* Feature grid */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.feat-grid.single{grid-template-columns:1fr}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px}
.feat-num{font-size:11.5px;font-weight:700;letter-spacing:.06em;margin-bottom:8px}
.teal-acc .feat-num{color:var(--t600)}
.coral-acc .feat-num{color:var(--c600)}
.feat-title{font-size:15px;font-weight:600;margin-bottom:10px;line-height:1.45}
.feat-body{font-size:13px;color:var(--muted);line-height:1.8}
.feat-body strong{color:var(--text);font-weight:500}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.pill{display:inline-block;font-size:12px;font-weight:500;padding:4px 11px;border-radius:100px;border:1px solid}
.pill.t{background:var(--t50);color:var(--t800);border-color:var(--t600)}
.pill.c{background:var(--c50);color:var(--c800);border-color:var(--c600)}
.pill.a{background:var(--a50);color:var(--a800);border-color:var(--a600)}
.pill.g{background:var(--g50);color:var(--g800);border-color:var(--g600)}

/* Process steps */
.steps{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.step{font-size:11.5px;padding:3px 8px;background:var(--g50);border-radius:4px;color:var(--muted)}
.step-arrow{font-size:10px;color:var(--muted);align-self:center}

/* Channel chips */
.channels{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.ch{font-size:11.5px;padding:3px 9px;background:var(--bg);border:1px solid var(--border-md);border-radius:100px;color:var(--muted)}

@media(max-width:680px){
  .page{padding:28px 16px 64px}
  .kj-svc{grid-template-columns:1fr}
  .t2-grid{grid-template-columns:1fr}
  .conn-zone{padding:0 30%}
  .feat-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>

window.addEventListener('hashchange', route);
